<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VVIP Media.NET</title>
<link rel="icon" href="/favicon.ico?v=3">
<link rel="preconnect" href="https://cdn.vvipmedia.net" crossorigin>

<style>
/* =========================================================
   VVIP MEDIA — CSS VARIABLES + THEME
   ========================================================= */
:root {
  --bg: #ffffff;
  --fg: #000000;
  --muted: #666666;
  --border: #cccccc;
  --border-light: #eeeeee;
  --card: #fafafa;
  --hover: #eef2ff;
  --playing: #fffde6;
  --playing-title: #cc0000;
  --link: #0000cc;
  --link-vis: #551a8b;
  --link-hov: #cc0000;
  --nav-bg: #000066;
  --nav-fg: #ffffff;
  --btn-bg: #dddddd;
  --btn-border-tl: #ffffff;
  --btn-border-br: #999999;
  --scrub-bg: #cccccc;
  --now-bg: #f4f4f4;
  --tab-inactive: #eeeeee;
  --star-on: #cc0000;
  --tag-bg: #000066;
  --tag-fg: #ffffff;
  --section-gradient-a: #000066;
  --section-gradient-b: #0000aa;

  /* logo gradient colors */
  --logo-g1: #000066;
  --logo-g2: #0044cc;
  --logo-g3: #000066;
  --logo-pulse-a: #0000cc;
  --logo-pulse-b: #4488ff;
}

[data-theme="dark"] {
  --bg: #0b0b0f;
  --fg: #eceff4;
  --muted: #9aa0a6;
  --border: #2a2a35;
  --border-light: #1e1e28;
  --card: #12121a;
  --hover: #1a1a2e;
  --playing: #1a1a00;
  --playing-title: #ffcc44;
  --link: #6699ff;
  --link-vis: #cc88ff;
  --link-hov: #ff6666;
  --nav-bg: #0a0a1a;
  --nav-fg: #aabbff;
  --btn-bg: #222233;
  --btn-border-tl: #444466;
  --btn-border-br: #111122;
  --scrub-bg: #222233;
  --now-bg: #0f0f1a;
  --tab-inactive: #141420;
  --star-on: #ffcc44;
  --tag-bg: #0a0a2a;
  --tag-fg: #aabbff;
  --section-gradient-a: #0a0a2a;
  --section-gradient-b: #101030;
  --logo-g1: #2244aa;
  --logo-g2: #5599ff;
  --logo-g3: #2244aa;
  --logo-pulse-a: #3355cc;
  --logo-pulse-b: #88aaff;
}

/* =========================================================
   BASE
   ========================================================= */
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "Times New Roman", Times, serif;
  font-size: 15px;
  line-height: 1.4;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--link); text-decoration: underline; }
a:visited { color: var(--link-vis); }
a:hover { color: var(--link-hov); }

#page {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 12px 120px;
}

/* =========================================================
   LOGO / HEADER
   ========================================================= */
#site-header {
  border-bottom: 2px solid var(--fg);
  padding: 18px 0 10px;
  position: relative;
}

#site-name {
  font-size: 28px;
  font-weight: bold;
  margin: 0 0 6px;
  font-family: "Times New Roman", Times, serif;
  display: inline-block;
  position: relative;

  /* Gradient text */
  background: linear-gradient(90deg, var(--logo-g1), var(--logo-g2), var(--logo-g3), var(--logo-pulse-b), var(--logo-g1));
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;

  /* Border/outline effect via text-shadow fallback — use drop-shadow filter */
  filter: drop-shadow(0 0 6px rgba(0, 0, 200, 0.18));

  animation: logoPulse 4s ease-in-out infinite;
}

@keyframes logoPulse {
  0%   { background-position: 0% 50%; filter: drop-shadow(0 0 4px rgba(0,0,200,0.15)); }
  50%  { background-position: 100% 50%; filter: drop-shadow(0 0 12px rgba(0,80,255,0.35)); }
  100% { background-position: 0% 50%; filter: drop-shadow(0 0 4px rgba(0,0,200,0.15)); }
}

[data-theme="dark"] #site-name {
  filter: drop-shadow(0 0 10px rgba(80, 140, 255, 0.4));
}

/* Gear button — top right */
#gear-btn {
  position: absolute;
  right: 0;
  top: 14px;
  font-size: 28px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: transform 0.4s ease;
  user-select: none;
}
#gear-btn:hover { transform: rotate(45deg); }

/* Gear dropdown */
#gear-menu {
  display: none;
  position: absolute;
  right: 0;
  top: 52px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-color: var(--btn-border-tl) var(--btn-border-br) var(--btn-border-br) var(--btn-border-tl);
  padding: 8px 12px;
  z-index: 100;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 12px;
  min-width: 200px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
}
#gear-menu.open { display: block; }
.gear-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid var(--border-light);
  gap: 12px;
  color: var(--fg);
}
.gear-item:last-child { border-bottom: none; }
.gear-item label { cursor: pointer; }
.gear-toggle {
  appearance: none;
  width: 32px; height: 16px;
  background: var(--scrub-bg);
  border: 1px inset var(--btn-border-br);
  border-radius: 8px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.gear-toggle:checked { background: #0044cc; }
.gear-toggle::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--btn-bg);
  top: 1px; left: 1px;
  transition: left 0.2s;
  border: 1px solid var(--btn-border-br);
}
.gear-toggle:checked::after { left: 17px; }

#site-nav {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  align-items: center;
}
#site-nav a, #site-nav button {
  color: var(--fg);
  text-decoration: none;
  margin-right: 14px;
  font-size: 12px;
  font-family: Arial, Helvetica, sans-serif;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  line-height: 1.8;
}
#site-nav a:hover, #site-nav button:hover { color: var(--link-hov); text-decoration: underline; }
.nav-sep { margin-right: 14px; color: var(--muted); line-height: 1.8; font-family: Arial, sans-serif; font-size: 12px; }

/* =========================================================
   NOW PLAYING BAR
   ========================================================= */
#now-bar {
  border-bottom: 1px solid var(--border);
  padding: 0;
  background: var(--now-bg);
  margin: 0 -12px;
  transition: background 0.3s;
}

/* Top row: thumb + title + controls + scrub */
#now-top {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
}

#now-thumb-wrap {
  flex-shrink: 0;
  position: relative;
  width: 72px; height: 72px;
}
#now-thumb {
  width: 72px; height: 72px;
  object-fit: cover;
  border: 1px solid var(--border);
  display: block;
  cursor: pointer;
}
#now-thumb-ph {
  width: 72px; height: 72px;
  border: 1px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  font-size: 11px;
  color: var(--muted);
}
/* Video overlay on thumb */
#now-thumb-wrap .vid-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: rgba(0,0,0,0.32);
  color: #fff;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
}
#now-thumb-wrap:hover .vid-overlay { opacity: 1; }

#now-info { flex: 1; min-width: 0; }
#now-title-show {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 13px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--fg);
}
#now-meta { font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: var(--muted); margin-top: 1px; }

/* Action icons row */
#now-actions {
  display: flex;
  gap: 4px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.now-icon {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 10px;
  background: var(--btn-bg);
  border: 1px solid;
  border-color: var(--btn-border-tl) var(--btn-border-br) var(--btn-border-br) var(--btn-border-tl);
  padding: 1px 6px;
  cursor: pointer;
  color: var(--fg);
  text-decoration: none;
  display: inline-block;
  line-height: 1.5;
  white-space: nowrap;
}
.now-icon:hover { background: var(--hover); }
.now-icon:active { border-color: var(--btn-border-br) var(--btn-border-tl) var(--btn-border-tl) var(--btn-border-br); }
.now-icon.members-only { color: var(--muted); border-color: var(--border); pointer-events: none; opacity: 0.55; }
.now-icon.version-btn { background: var(--tag-bg); color: var(--tag-fg); border-color: var(--tag-bg); }

#now-controls { display: flex; gap: 3px; flex-shrink: 0; align-self: center; }

.cbtn {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 11px;
  background: var(--btn-bg);
  border: 1px solid;
  border-color: var(--btn-border-tl) var(--btn-border-br) var(--btn-border-br) var(--btn-border-tl);
  padding: 2px 8px;
  cursor: pointer;
  color: var(--fg);
  white-space: nowrap;
}
.cbtn:hover { background: var(--hover); }
.cbtn:active { border-color: var(--btn-border-br) var(--btn-border-tl) var(--btn-border-tl) var(--btn-border-br); }

#now-time {
  font-family: "Courier New", Courier, monospace;
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}
#scrub-wrap { flex: 1; max-width: 110px; min-width: 50px; flex-shrink: 1; }
#pb-scrub {
  width: 100%;
  -webkit-appearance: none;
  height: 10px;
  background: var(--scrub-bg);
  border: 1px inset var(--btn-border-br);
  outline: none;
  cursor: pointer;
}
#pb-scrub::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 12px;
  background: var(--btn-bg);
  border: 1px solid;
  border-color: var(--btn-border-tl) var(--btn-border-br) var(--btn-border-br) var(--btn-border-tl);
  cursor: pointer;
}

/* Inline video player (replaces thumb) */
#now-video-wrap {
  display: none;
  width: 100%;
  background: #000;
  position: relative;
}
#now-video-wrap video {
  width: 100%;
  max-height: 360px;
  display: block;
}
#now-video-close {
  position: absolute;
  top: 4px; right: 8px;
  font-family: Arial, sans-serif;
  font-size: 11px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: 1px solid #555;
  padding: 1px 6px;
  cursor: pointer;
}

/* =========================================================
   VIEW TABS
   ========================================================= */
.view-tabs {
  display: flex;
  margin-top: 12px;
  border-bottom: 1px solid var(--border);
}
.view-tab {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 12px;
  padding: 4px 12px;
  background: var(--tab-inactive);
  border: 1px solid var(--border);
  border-bottom: none;
  cursor: pointer;
  color: var(--fg);
  margin-right: 2px;
  position: relative;
  top: 1px;
}
.view-tab.active {
  background: var(--bg);
  border-bottom-color: var(--bg);
  font-weight: bold;
}
.view-tab:hover:not(.active) { background: var(--hover); }

/* =========================================================
   TOOLBAR
   ========================================================= */
#toolbar {
  border: 1px solid var(--border);
  border-top: none;
  border-bottom: 1px solid var(--border);
  padding: 5px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  background: var(--card);
  font-family: Arial, Helvetica, sans-serif;
  font-size: 12px;
}
#toolbar select {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 12px;
  border: 1px inset var(--btn-border-br);
  background: var(--bg);
  color: var(--fg);
  padding: 1px 2px;
}
#search-input {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 12px;
  border: 1px inset var(--btn-border-br);
  padding: 1px 4px;
  background: var(--bg);
  color: var(--fg);
  width: 130px;
}
.tbtn {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 11px;
  background: var(--btn-bg);
  border: 1px solid;
  border-color: var(--btn-border-tl) var(--btn-border-br) var(--btn-border-br) var(--btn-border-tl);
  padding: 1px 7px;
  cursor: pointer;
  color: var(--fg);
}
.tbtn:hover { background: var(--hover); }
.tbtn.pressed { border-color: var(--btn-border-br) var(--btn-border-tl) var(--btn-border-tl) var(--btn-border-br); background: var(--hover); }
#track-count { color: var(--muted); font-size: 11px; margin-left: auto; }

/* =========================================================
   ABOUT
   ========================================================= */
#about-section {
  display: none;
  border: 1px solid var(--border);
  border-top: none;
  padding: 16px;
  background: var(--card);
}
#about-section.open { display: block; }
#about-section h2 {
  font-family: "Times New Roman", Times, serif;
  font-size: 18px;
  margin: 0 0 10px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  color: var(--fg);
}
#about-section p { font-size: 14px; margin: 0 0 8px; line-height: 1.5; color: var(--fg); }
#about-section a { color: var(--link); }

/* =========================================================
   HASHTAG PLAYLIST VIEW
   ========================================================= */
#hashtag-view { display: none; }
#hashtag-view.open { display: block; }

.htag-section {
  border: 1px solid var(--border);
  border-top: none;
  margin-bottom: 0;
}
.htag-section:first-child { border-top: 1px solid var(--border); }

.htag-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 10px;
  background: linear-gradient(90deg, var(--section-gradient-a), var(--section-gradient-b));
  color: var(--tag-fg);
  cursor: pointer;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: .06em;
  text-transform: uppercase;
  user-select: none;
}
.htag-head:hover { opacity: 0.9; }
.htag-head .htag-count {
  font-size: 10px;
  opacity: 0.75;
  font-weight: normal;
  letter-spacing: 0;
  text-transform: none;
}
.htag-head .htag-arrow { font-size: 10px; margin-left: 8px; }

.htag-body { display: none; }
.htag-body.open { display: block; }

/* iTunes / M3U export button */
.htag-export {
  display: inline-block;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 10px;
  background: var(--btn-bg);
  border: 1px solid;
  border-color: var(--btn-border-tl) var(--btn-border-br) var(--btn-border-br) var(--btn-border-tl);
  padding: 1px 6px;
  cursor: pointer;
  color: var(--fg);
  margin: 4px 8px;
  text-decoration: none;
}
.htag-export:hover { background: var(--hover); }

/* =========================================================
   TRACK LIST
   ========================================================= */
#list {
  border: 1px solid var(--border);
  border-top: none;
}
.section-head {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 11px;
  font-weight: bold;
  color: var(--tag-fg);
  background: linear-gradient(90deg, var(--section-gradient-a), var(--section-gradient-b));
  padding: 2px 8px;
  letter-spacing: .06em;
  text-transform: uppercase;
  border-top: 1px solid var(--border);
}
.section-head:first-child { border-top: none; }

.track-row {
  display: table;
  width: 100%;
  box-sizing: border-box;
  border-top: 1px solid var(--border-light);
  cursor: pointer;
  table-layout: fixed;
  background: var(--bg);
}
.track-row:first-child, .section-head + .track-row { border-top: none; }
.track-row:hover { background: var(--hover); }
.track-row.is-playing { background: var(--playing); }
.track-row.is-playing .t-title { color: var(--playing-title); }

.t-num {
  display: table-cell;
  font-family: "Courier New", Courier, monospace;
  font-size: 10px;
  color: var(--muted);
  padding: 6px 4px 6px 8px;
  vertical-align: middle;
  width: 30px;
  white-space: nowrap;
}
.t-thumb-cell {
  display: table-cell;
  width: 42px;
  padding: 5px 5px;
  vertical-align: middle;
}
.t-thumb {
  width: 36px; height: 36px;
  object-fit: cover;
  border: 1px solid var(--border);
  display: block;
}
.t-mid {
  display: table-cell;
  vertical-align: middle;
  padding: 5px 6px;
}
.t-title {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 13px;
  font-weight: bold;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* Hide titles by default when toggled off */
body.hide-titles .t-title { visibility: hidden; }
body.hide-titles #now-title-show { visibility: hidden; }

.t-meta {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.t-right {
  display: table-cell;
  vertical-align: middle;
  padding: 5px 8px 5px 4px;
  text-align: right;
  white-space: nowrap;
  width: 100px;
}
.t-right a, .t-right button {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 10px;
  color: var(--fg);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 1px 5px;
  background: var(--btn-bg);
  margin-left: 3px;
  cursor: pointer;
  display: inline-block;
  line-height: 1.4;
}
.t-right a:hover, .t-right button:hover { background: var(--hover); }
.t-right a.wav-off { color: var(--muted); border-color: var(--border); pointer-events: none; opacity: 0.5; }
.star-btn {
  background: none !important;
  border: none !important;
  font-size: 13px !important;
  cursor: pointer;
  color: var(--muted);
  padding: 1px 3px !important;
  margin-left: 2px !important;
}
.star-btn.on { color: var(--star-on); }

.extras-row {
  display: table;
  width: 100%;
  box-sizing: border-box;
}
.extras-cell {
  display: table-cell;
  padding: 6px 8px;
  border-top: 1px solid var(--border-light);
  background: var(--card);
}
.extras-cell img {
  width: 56px; height: 56px;
  object-fit: cover;
  border: 1px solid var(--border);
  margin-right: 4px;
  vertical-align: top;
}

#empty-msg {
  display: none;
  padding: 20px;
  font-family: Arial, sans-serif;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  font-style: italic;
  border: 1px solid var(--border);
  border-top: none;
}

/* =========================================================
   RESPONSIVE
   ========================================================= */
@media (max-width: 480px) {
  #site-name { font-size: 22px; }
  .t-num { display: none; }
  #scrub-wrap { display: none; }
  #now-time { display: none; }
  #search-input { width: 80px; }
  .t-right { width: 60px; }
  .t-right a:not(.star-btn) { display: none; }
  #now-thumb-wrap { width: 52px; height: 52px; }
  #now-thumb, #now-thumb-ph { width: 52px; height: 52px; }
}
</style>
</head>
<body>

<iframe id="vvip-player-frame" src="./player.html?v=7" allow="autoplay" style="display:none;width:0;height:0;border:0"></iframe>

<div id="page">

  <!-- HEADER -->
  <div id="site-header">
    <div id="site-name"><u>VVIP Media.NET</u></div>
    <div id="site-nav">
      <a href="/" onclick="return showHome()">Home</a>
      <button onclick="toggleAbout()">About</button>
      <a href="https://shoppe.vvipmedia.net" target="_blank" rel="noopener">Store</a>
      <a href="https://www.youtube.com/@VVVVIIPP26" target="_blank" rel="noopener">YouTube</a>
      <a href="https://www.instagram.com/vvipmediadotnet/" target="_blank" rel="noopener">Instagram</a>
      <span class="nav-sep">|</span>
      <button onclick="alert('Member login coming soon. WAV downloads + HQ video available to registered members.')">Member login</button>
    </div>

    <!-- Gear menu -->
    <button id="gear-btn" title="Settings" onclick="toggleGear()">⚙️</button>
    <div id="gear-menu">
      <div class="gear-item">
        <label for="tog-dark">Dark mode</label>
        <input type="checkbox" id="tog-dark" class="gear-toggle" onchange="toggleDark(this.checked)">
      </div>
      <div class="gear-item">
        <label for="tog-titles">Show titles</label>
        <input type="checkbox" id="tog-titles" class="gear-toggle" checked onchange="toggleTitles(this.checked)">
      </div>
    </div>
  </div>

  <!-- ABOUT -->
  <div id="about-section">
    <h2>About VVIP Media</h2>
    <p>VVIP Media is your Media Hub for All Things VVIP.</p>
    <p>Licensing inquiries: <a href="mailto:info@vvipmedia.net">info@vvipmedia.net</a></p>
    <p><small>VVIP+ = HQ Video, WAV downloads, Additional MERCH opportunities. 🇨🇦</small></p>
  </div>

  <!-- NOW PLAYING -->
  <div id="now-bar">
    <div id="now-top">
      <div id="now-thumb-wrap">
        <div id="now-thumb-ph">—</div>
        <img id="now-thumb" src="" alt="" style="display:none">
        <div class="vid-overlay" id="vid-overlay-btn" title="Play video">▶</div>
      </div>
      <div id="now-info">
        <div id="now-title-show">Nothing playing</div>
        <div id="now-meta"></div>
        <div id="now-actions"></div>
      </div>
      <div id="now-controls">
        <button class="cbtn" id="btn-prev">◄◄</button>
        <button class="cbtn" id="btn-toggle">► Play</button>
        <button class="cbtn" id="btn-next">►►</button>
      </div>
      <div id="scrub-wrap"><input type="range" id="pb-scrub" min="0" max="100" value="0" step="0.1"></div>
      <div id="now-time">0:00</div>
    </div>
    <!-- Inline video slot -->
    <div id="now-video-wrap">
      <button id="now-video-close" onclick="closeVideo()">✕ Close</button>
      <video id="now-video" controls></video>
    </div>
  </div>

  <!-- VIEW TABS -->
  <div class="view-tabs">
    <button class="view-tab active" data-view="all">All songs</button>
    <button class="view-tab" data-view="hashtags">Playlists</button>
    <button class="view-tab" data-view="favorites">Favourites</button>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <label for="sort-sel" style="font-family:Arial,sans-serif;font-size:12px">Sort:</label>
    <select id="sort-sel">
      <option value="date_desc">Newest first</option>
      <option value="date_asc">Oldest first</option>
      <option value="bpm_desc">BPM (high–low)</option>
      <option value="bpm_asc">BPM (low–high)</option>
      <option value="fav">Favourites first</option>
    </select>
    <label for="search-input" style="font-family:Arial,sans-serif;font-size:12px">Search:</label>
    <input type="search" id="search-input" placeholder="title or #tag" autocomplete="off" spellcheck="false">
    <button class="tbtn" id="formats-btn">Show files</button>
    <span id="track-count"></span>
  </div>

  <!-- HASHTAG PLAYLIST VIEW -->
  <div id="hashtag-view"></div>

  <!-- MAIN LIST -->
  <div id="list"></div>
  <div id="empty-msg">No tracks found.</div>

</div><!-- #page -->

<script>
/* =========================================================
   CONFIG
   ========================================================= */
const ASSET_VERSION   = 19;
const PREFERRED_TITLE = 'Lately';
const BASE_MP3    = 'https://cdn.vvipmedia.net/ACCESS/';
const BASE_WAV    = 'https://cdn.vvipmedia.net/WAV/';
const BASE_THUMB  = 'assets/thumbs/';
const DEFAULT_THUMB = BASE_THUMB + 'default_thumb.jpg';
const BASE_EXTRAS = 'https://cdn.vvipmedia.net/MEDIA/extras/';
const BASE_VIDEOS = 'https://cdn.vvipmedia.net/VIDEOS/';    // HQ .mov
const BASE_VIDS_LO= 'https://cdn.vvipmedia.net/videos/';   // lo-fi .mp4

/* =========================================================
   HELPERS
   ========================================================= */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
function fmtDur(s){ s=Number(s||0); return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }
const stripExt = s => String(s).replace(/\.[a-z0-9 _-]*$/i,'');
const stripExtSimple = s => String(s).replace(/\.[a-z0-9]+$/i,'');
function deriveName(n){ const b=stripExtSimple(n).replace(/^[\d._-]+/,'').replace(/[_-]+/g,' ').trim(); return b||stripExtSimple(n); }
const DATE_RX=/^\s*(\d{2})[.\-_](\d{2})[.\-_](\d{2})/;
function dateFromName(n){ const m=n.match(DATE_RX); if(!m) return null; const y=+m[1]; return new Date(Date.UTC(y>=70?1900+y:2000+y,+m[2]-1,+m[3])); }
function bpmLabel(t){ if(t.bpm!=null) return `${t.bpm} BPM`; if(t.bpm_min!=null&&t.bpm_max!=null) return `${t.bpm_min}–${t.bpm_max} BPM`; return ''; }
function matchToks(t,toks){ if(!toks.length) return true; const n=(t.name||'').toLowerCase(),ti=(t.title||'').toLowerCase(),d=(t.details||'').toLowerCase(); return toks.every(k=>k.startsWith('#')?d.includes(k):n.includes(k)||ti.includes(k)||d.includes(k)); }

/* Extract #tags from details string */
function extractTags(details){
  if(!details) return [];
  return [...details.matchAll(/#([a-zA-Z0-9_-]+)/g)].map(m=>m[1].toLowerCase());
}

/* =========================================================
   STATE
   ========================================================= */
const state = {
  tracks:[], filtered:[], i:-1, playing:false, duration:0,
  thumbBases:new Set(), resolvedThumb:new Map(),
  favorites:new Set(JSON.parse(localStorage.getItem('vvip25:favs')||'[]')),
  favOrder:JSON.parse(localStorage.getItem('vvip25:favOrder')||'[]'),
  searchQuery:'', viewMode:'all', sortMode:'date_desc',
  extras:{}, showFormats:false, hiddenIds:new Set(), titles:null,
  // Track video state
  currentVideoUrl: null,
};

const pf = $('#vvip-player-frame');
function send(d){ pf?.contentWindow?.postMessage(d,'*'); }

/* =========================================================
   SETTINGS (gear)
   ========================================================= */
function toggleGear(){
  $('#gear-menu').classList.toggle('open');
}
document.addEventListener('click', e=>{
  if(!e.target.closest('#gear-btn')&&!e.target.closest('#gear-menu')){
    $('#gear-menu').classList.remove('open');
  }
});
function toggleDark(on){
  document.documentElement.setAttribute('data-theme', on?'dark':'light');
  localStorage.setItem('vvip25:dark', on?'1':'');
}
function toggleTitles(on){
  document.body.classList.toggle('hide-titles', !on);
  localStorage.setItem('vvip25:hideTitles', on?'':'1');
}
// Restore settings
(()=>{
  if(localStorage.getItem('vvip25:dark')==='1'){
    document.documentElement.setAttribute('data-theme','dark');
    $('#tog-dark').checked=true;
  }
  if(localStorage.getItem('vvip25:hideTitles')==='1'){
    document.body.classList.add('hide-titles');
    $('#tog-titles').checked=false;
  }
})();

/* =========================================================
   ABOUT + HOME
   ========================================================= */
function showHome(){ $('#about-section').classList.remove('open'); return false; }
function toggleAbout(){ $('#about-section').classList.toggle('open'); }

/* =========================================================
   VIEW TABS
   ========================================================= */
$$('.view-tab').forEach(btn => btn.addEventListener('click', () => {
  $$('.view-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.viewMode=btn.dataset.view;
  state.searchQuery=''; $('#search-input').value='';
  applyFilterSort();
}));

/* =========================================================
   TOOLBAR
   ========================================================= */
$('#sort-sel').addEventListener('change', e=>{ state.sortMode=e.target.value; applyFilterSort(); });
$('#search-input').addEventListener('input', debounce(e=>{ state.searchQuery=e.target.value.trim().toLowerCase(); applyFilterSort(); },140));
$('#formats-btn').addEventListener('click', ()=>{
  state.showFormats=!state.showFormats;
  $('#formats-btn').classList.toggle('pressed',state.showFormats);
  $('#formats-btn').textContent=state.showFormats?'Hide files':'Show files';
  renderList();
});

/* =========================================================
   BOOT — fetch manifest + titles + thumbs
   ========================================================= */
document.addEventListener('DOMContentLoaded', async ()=>{
  $('#btn-toggle').addEventListener('click',()=>{ if(state.i<0&&state.filtered.length){select(0);play();return;} state.playing?pause():play(); });
  $('#btn-prev').addEventListener('click',()=>{ if(!state.filtered.length)return; select((state.i-1+state.filtered.length)%state.filtered.length); play(); });
  $('#btn-next').addEventListener('click',()=>{ if(!state.filtered.length)return; select((state.i+1)%state.filtered.length); play(); });

  // Video overlay
  $('#vid-overlay-btn').addEventListener('click', e=>{ e.stopPropagation(); openVideo(); });

  try {
    const res=await fetch('https://vvipmedia.net/manifest.json',{cache:'no-store'});
    if(!res.ok) throw Error(res.status);
    const data=JSON.parse(await res.text());
    const raw=Array.isArray(data)?data:(data.tracks||[]);

    // Group versions: find tracks that are versions of others (same base date+bpm stem, suffixed v2/v3 or -2/-3)
    // Build a map: canonical name -> [versions]
    // We'll do this after loading, by matching stripped base

    state.tracks = raw.map((t,idx)=>{
      const name=t.name||'';
      const base=stripExtSimple(name);
      const baseLower=base.toLowerCase();
      const date=t.date?new Date(t.date):dateFromName(name);
      const tags=extractTags(t.details||'');
      // Detect if this is a v2/v3 variant
      const vMatch = name.match(/\s*v(\d+)\.mp3$/i) || name.match(/v(\d+)\.mp3$/i);
      const varNum = vMatch ? parseInt(vMatch[1]) : null;
      // Detect -2/-3 suffix (second/third track same day)
      const dashMatch = name.match(/-(\d+)\.\d+\.mp3$/);
      const dashNum = dashMatch ? parseInt(dashMatch[1]) : null;

      return {
        id:idx, name, base, baseLower,
        title: t.title || deriveName(name),
        details: t.details||'',
        bpm: t.bpm, bpm_min: t.bpm_min, bpm_max: t.bpm_max,
        length: t.length||0,
        src: `${BASE_MP3}${encodeURIComponent(name)}`,
        wavSrc: `${BASE_WAV}${encodeURIComponent(name.replace(/\.mp3$/i,'.wav'))}`,
        video: t.video||null,
        date, tags,
        varNum,   // null = original, 2 = v2, 3 = v3
        dashNum,  // null = first, 2 = second that day
        versions: [],  // filled below
      };
    });

    // Link versions: group by stripping v2/v3 suffix from name
    const versionGroups = {};
    for(const t of state.tracks){
      // canonical key: strip v2/v3 from name
      const canon = t.name.replace(/\s*v\d+\.mp3$/i,'.mp3').toLowerCase();
      (versionGroups[canon] = versionGroups[canon]||[]).push(t);
    }
    // For each group with multiple, attach versions to the canonical (lowest varNum)
    for(const [canon, group] of Object.entries(versionGroups)){
      if(group.length<2) continue;
      group.sort((a,b)=>(a.varNum||1)-(b.varNum||1));
      const primary = group[0];
      primary.versions = group.slice(1);
    }

    await fetchThumbs(); computeThumbCascade();
    await fetchTitles(); applyTitles();

    // Default tab is hashtag view
    applyFilterSort();
    preselectPreferred(PREFERRED_TITLE.toLowerCase());
    updateNow();

    try{ const er=await fetch(`/extras.json?v=${ASSET_VERSION}`,{cache:'no-store'}); state.extras=await er.json(); }catch{}

  } catch(err){
    $('#list').innerHTML=`<div style="padding:16px;font-family:Arial,sans-serif;font-size:13px;color:var(--muted)">Could not load tracks. Please refresh.</div>`;
    console.error(err);
  }
});

/* =========================================================
   TITLES + THUMBS
   ========================================================= */
async function fetchTitles(){
  try{
    const r=await fetch('https://vvipmedia.net/titles.json',{cache:'no-store'}); if(!r.ok) throw 0;
    let raw=(await r.text()).trim().replace(/^\uFEFF/,'');
    const json=JSON.parse(raw); const m=new Map();
    for(const [k,v] of Object.entries(json||{})) m.set(stripExtSimple(k).toLowerCase(),typeof v==='string'?v:v.title||'');
    state.titles=m;
  }catch{}
}
function applyTitles(){
  if(!state.titles) return;
  for(const t of state.tracks){
    const n=state.titles.get(t.baseLower);
    if(n&&n.trim()) t.title=n.trim();
  }
}

async function fetchThumbs(){
  try{
    const r=await fetch('assets/thumbs/thumbs.json',{cache:'no-store'}); const d=await r.json();
    state.thumbBases.clear(); d.forEach(f=>state.thumbBases.add(f.toLowerCase()));
  }catch{
    ['24.03.15.105thumb.jpg','24.09.03.122thumb.jpg','25.07.17.171thumb.jpg','IJPAUCthumb.png']
      .forEach(f=>state.thumbBases.add(f.toLowerCase()));
  }
}
function computeThumbCascade(){
  const asc=[...state.tracks].sort((a,b)=>(a.date-b.date)||a.name.localeCompare(b.name));
  let cur=DEFAULT_THUMB;
  for(const t of asc){
    const k1=t.baseLower+'thumb.jpg',k2=t.baseLower+'thumb.png';
    if(state.thumbBases.has(k1)) cur=BASE_THUMB+k1;
    else if(state.thumbBases.has(k2)) cur=BASE_THUMB+k2;
    state.resolvedThumb.set(t.id,cur);
  }
}
function getThumb(t){ if((t.details||'').toLowerCase().includes('#ij')) return BASE_THUMB+'IJPAUCthumb.jpg'; return state.resolvedThumb.get(t.id)||DEFAULT_THUMB; }

/* =========================================================
   VIDEO
   ========================================================= */
// Known lo-fi video map (from bucket listing, matched by title keywords)
const LO_VIDEO_MAP = {
  'dusky': '_VVIP dusky.mp4',
  'a light breeze': '_VVIP Wed Aug 6 (A Light Breeze).mp4',
  'kits': '_VVIP Thu Aug 7 (Kits).mp4',
  'lit(e) rail': '_VVIP lit rail.mp4',
  'goofy spoon': '_VVIP goofy spoon.mp4',
  'free zone': '_VVIP free zone.mp4',
  'mbpx': '_VVIP mbpx.mp4',
  'ærie': '_VVIP ærie.mp4',
  'ocean park': '_VVIP ocean park.mp4',
  'slowwww': '_VVIP25 slowwww.mp4',
  'analog tv': '_VVIP Analog TV.mp4',
  'chevy weather': '_VVIP Chevy Weather {trailer}.mp4',
  'purple morning': '_VVIP Purple Morning.mp4',
  'afternoon sunset': '_VVIP24 Afternoon Sunset.mp4',
  'arcade water': '_VVIP24 Arcade Water {Full Album}.mp4',
  'arcade winter': '_VVIP24 Arcade Winter.mp4',
};

function getVideoUrl(t, hq=false){
  const titleLower = (t.title||'').toLowerCase();
  if(hq){
    // HQ: look in VIDEOS bucket (mov files named "VVIP <Title>.mov")
    // We'll just try with the title
    return null; // to be expanded when user provides more info
  }
  // lo-fi: check map
  for(const [key, file] of Object.entries(LO_VIDEO_MAP)){
    if(titleLower.includes(key)) return BASE_VIDS_LO + encodeURIComponent(file);
  }
  return null;
}

function openVideo(hq=false){
  const t = state.filtered[state.i]; if(!t) return;
  const url = getVideoUrl(t, hq);
  if(!url){ alert(hq?'HQ video not available for this track.':'No video available for this track.'); return; }
  const vw=$('#now-video-wrap'), vid=$('#now-video');
  vw.style.display='block';
  vid.src=url;
  vid.play().catch(()=>{});
  state.currentVideoUrl=url;
}
function closeVideo(){
  const vw=$('#now-video-wrap'), vid=$('#now-video');
  vw.style.display='none';
  vid.pause(); vid.src='';
  state.currentVideoUrl=null;
}

/* =========================================================
   FILTER + SORT
   ========================================================= */
const SORT_MODES_NO_BPM = ['date_desc','date_asc','fav'];

function applyFilterSort(){
  const toks=(state.searchQuery||'').split(/\s+/).filter(Boolean);
  let out=[...state.tracks];

  // Filter out version tracks from main list (they appear as sub-items)
  out = out.filter(t => t.varNum===null || t.varNum===undefined);

  if(state.searchQuery){
    out=out.filter(t=>matchToks(t,toks));
  } else if(state.viewMode==='favorites'){
    out=out.filter(t=>state.favorites.has(t.name));
    if(state.favOrder.length){
      out.sort((a,b)=>state.favOrder.indexOf(a.name)-state.favOrder.indexOf(b.name));
      state.filtered=out; renderList(); return;
    }
  } else if(state.viewMode==='hashtags'){
    state.filtered=out; renderHashtags(); return;
  }

  sortTracks(out, state.sortMode);
  state.filtered=out; renderList();
}

function sortTracks(arr, mode){
  arr.sort((a,b)=>{
    if(mode==='date_asc') return (a.date-b.date)||a.name.localeCompare(b.name);
    if(mode==='bpm_desc') return (b.bpm||b.bpm_min||0)-(a.bpm||a.bpm_min||0);
    if(mode==='bpm_asc')  return (a.bpm||a.bpm_min||0)-(b.bpm||b.bpm_min||0);
    if(mode==='fav')      return (state.favorites.has(b.name)?1:0)-(state.favorites.has(a.name)?1:0);
    return (b.date-a.date)||b.name.localeCompare(a.name); // date_desc default
  });
}

/* =========================================================
   HASHTAG VIEW
   ========================================================= */
const SORT_MODES_FOR_RANDOM = ['date_desc','date_asc','bpm_desc','bpm_asc'];

function renderHashtags(){
  const hv=$('#hashtag-view'), list=$('#list'), empty=$('#empty-msg');
  list.style.display='none';
  hv.style.display='block'; hv.classList.add('open');
  empty.style.display='none';

  // Build tag -> tracks map
  const tagMap = {};
  for(const t of state.tracks){
    if(t.varNum) continue; // skip pure version tracks
    for(const tag of t.tags){
      (tagMap[tag]=tagMap[tag]||[]).push(t);
    }
    if(!t.tags.length){
      (tagMap['untagged']=tagMap['untagged']||[]).push(t);
    }
  }

  // Sort tags alphabetically, put 'untagged' last
  const tags = Object.keys(tagMap).sort((a,b)=>{
    if(a==='untagged') return 1;
    if(b==='untagged') return -1;
    return a.localeCompare(b);
  });

  // Pick a random default-open tag and random sort for it
  const eligibleDefault = tags.filter(t=>t!=='untagged');
  const defaultTag = eligibleDefault[Math.floor(Math.random()*eligibleDefault.length)] || tags[0];
  const defaultSort = SORT_MODES_FOR_RANDOM[Math.floor(Math.random()*SORT_MODES_FOR_RANDOM.length)];

  hv.innerHTML='';

  let firstTrackSet = false;

  for(const tag of tags){
    const tracks = tagMap[tag];
    const isDefault = tag===defaultTag;

    // Sort this section
    const sectionTracks = [...tracks];
    if(isDefault){
      sortTracks(sectionTracks, defaultSort);
    } else {
      sortTracks(sectionTracks, 'date_desc');
    }

    const sec = document.createElement('div');
    sec.className='htag-section';

    const head = document.createElement('div');
    head.className='htag-head';
    head.innerHTML=`<span>#${tag} <span class="htag-count">[${tracks.length}]</span></span><span class="htag-arrow">${isDefault?'▾':'▸'}</span>`;
    sec.appendChild(head);

    const body = document.createElement('div');
    body.className='htag-body'+(isDefault?' open':'');

    // Export button
    const exportBtn = document.createElement('a');
    exportBtn.className='htag-export';
    exportBtn.textContent='⬇ Save playlist (.m3u)';
    exportBtn.href='#';
    exportBtn.addEventListener('click', ev=>{
      ev.preventDefault();
      downloadM3U(tag, sectionTracks);
    });
    body.appendChild(exportBtn);

    // Rows
    sectionTracks.forEach((t,i)=>{
      body.insertAdjacentHTML('beforeend', rowHTML(t,i));
    });
    sec.appendChild(body);

    // Toggle
    head.addEventListener('click',()=>{
      const open = body.classList.toggle('open');
      head.querySelector('.htag-arrow').textContent = open?'▾':'▸';
    });

    hv.appendChild(sec);

    // Preload first track of default section into player
    if(isDefault && !firstTrackSet && sectionTracks.length){
      const merged = [...state.tracks];
      // Set filtered to this section for prev/next navigation
      state.filtered = sectionTracks;
      select(0);
      firstTrackSet=true;
    }
  }
  updateNow();
}

/* =========================================================
   M3U EXPORT (iTunes-compatible)
   ========================================================= */
function downloadM3U(tag, tracks){
  let m3u='#EXTM3U\n';
  for(const t of tracks){
    const dur = t.length||0;
    const label = t.title;
    m3u+=`#EXTINF:${dur},${label}\n${t.src}\n`;
  }
  const blob=new Blob([m3u],{type:'audio/x-mpegurl'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`VVIP_${tag}.m3u`;
  a.click();
}

/* =========================================================
   RENDER LIST (All songs / Favourites)
   ========================================================= */
function renderList(){
  const hv=$('#hashtag-view'), elList=$('#list'), elEmpty=$('#empty-msg');
  hv.style.display='none'; hv.classList.remove('open');
  elList.style.display='';

  const out=state.filtered.filter(t=>!state.hiddenIds.has(t.id));
  if(!out.length){ elList.innerHTML=''; elEmpty.style.display='block'; return; }
  elEmpty.style.display='none';
  $('#track-count').textContent=out.length===state.tracks.filter(t=>!t.varNum).length
    ?`${out.length} tracks`
    :`${out.length} / ${state.tracks.filter(t=>!t.varNum).length}`;

  elList.innerHTML=out.map((t,i)=>rowHTML(t,i)).join('');

  if(state.i>=0&&state.filtered[state.i]){
    elList.querySelector(`.track-row[data-id="${state.filtered[state.i].id}"]`)?.classList.add('is-playing');
  }
}

/* =========================================================
   ROW HTML
   ========================================================= */
function rowHTML(t,i){
  const sub=[bpmLabel(t),t.length?fmtDur(t.length):'',t.date?t.date.toISOString().slice(0,10):''].filter(Boolean).join(' · ');
  const fav=state.favorites.has(t.name);
  const hasExtras=state.extras&&state.extras[t.baseLower];
  let right=`<button class="star-btn${fav?' on':''}" data-fav="${t.name}" title="${fav?'Remove from':'Add to'} favourites">★</button>`;
  if(hasExtras) right=`<button class="gem-btn" data-gem="${t.baseLower}" style="background:none;border:none;cursor:pointer;font-size:11px;padding:1px 3px;margin-left:2px">💎</button>`+right;
  if(state.showFormats){
    right=`<a href="${t.src}" download title="Download MP3">MP3</a>`
        +`<a class="wav-off" href="#" title="WAV (members only)">WAV</a>`
        +right;
  }
  // Version indicator (if this track has versions)
  let versionTag='';
  if(t.versions&&t.versions.length){
    versionTag=`<span style="font-family:Arial,sans-serif;font-size:9px;background:var(--tag-bg);color:var(--tag-fg);padding:0 4px;margin-left:4px;border-radius:2px">v${1+t.versions.length}</span>`;
  }
  return `<div class="track-row" data-id="${t.id}">
    <span class="t-num">${String(i+1).padStart(3,'0')}</span>
    <span class="t-thumb-cell"><img class="t-thumb" src="${getThumb(t)}" alt="" loading="lazy" onerror="this.src='${DEFAULT_THUMB}'"></span>
    <span class="t-mid"><div class="t-title">${t.title}${versionTag}</div><div class="t-meta">${sub}</div></span>
    <span class="t-right">${right}</span>
  </div>`;
}

/* =========================================================
   CLICKS
   ========================================================= */
document.addEventListener('click', e=>{
  const row=e.target.closest('.track-row');
  if(row&&!e.target.closest('a')&&!e.target.closest('.star-btn')&&!e.target.closest('.gem-btn')){
    const id=Number(row.dataset.id);
    // If we're in hashtag view, build filtered from visible rows in that section
    if(state.viewMode==='hashtags'){
      const section=row.closest('.htag-body');
      if(section){
        const rowEls=[...section.querySelectorAll('.track-row')];
        state.filtered=rowEls.map(r=>state.tracks.find(t=>t.id===Number(r.dataset.id))).filter(Boolean);
      }
    }
    const idx=state.filtered.findIndex(t=>t.id===id);
    if(idx>=0){select(idx);play();}
    return;
  }

  const star=e.target.closest('.star-btn');
  if(star){
    const name=star.dataset.fav, was=state.favorites.has(name);
    was?state.favorites.delete(name):state.favorites.add(name);
    localStorage.setItem('vvip25:favs',JSON.stringify([...state.favorites]));
    star.classList.toggle('on',!was);
    if(state.viewMode==='favorites'&&was) applyFilterSort();
    return;
  }

  const gem=e.target.closest('.gem-btn');
  if(gem){
    e.preventDefault();
    const key=gem.dataset.gem, files=state.extras[key]; if(!files) return;
    const row2=gem.closest('.track-row'), next=row2?.nextElementSibling;
    if(next?.classList.contains('extras-row')){next.remove();return;}
    const d=document.createElement('div');
    d.className='extras-row';
    d.innerHTML=`<span class="extras-cell">${files.map(f=>{const url=`${BASE_EXTRAS}${encodeURIComponent(f)}`;return /\.(jpg|jpeg|png|gif|webp)$/i.test(f)?`<a href="${url}" target="_blank"><img src="${url}" alt="" loading="lazy"></a>`:`<a href="${url}" target="_blank" style="font-family:Arial,sans-serif;font-size:11px">${f}</a>`;}).join('')}</span>`;
    row2?.after(d);
  }
});

/* =========================================================
   PLAYER CONTROLS
   ========================================================= */
function select(i){
  state.i=i;
  const t=state.filtered[i]; if(!t) return;
  send({cmd:'load',src:t.src,play:false});
  updateNow();
  // Close any open video
  closeVideo();
  // Update playing state in list
  $$('.track-row').forEach(r=>r.classList.remove('is-playing'));
  document.querySelector(`.track-row[data-id="${t.id}"]`)?.classList.add('is-playing');
}
function play(){ if(state.i<0)return; send({cmd:'load',src:state.filtered[state.i].src,play:true}); state.playing=true; $('#btn-toggle').textContent='⏸ Pause'; }
function pause(){ send({cmd:'pause'}); state.playing=false; $('#btn-toggle').textContent='► Play'; }
function preselectPreferred(x){ if(!x||!state.filtered.length)return; const idx=state.filtered.findIndex(t=>(t.title||'').toLowerCase().includes(x)); if(idx>=0)select(idx); }

/* =========================================================
   UPDATE NOW BAR
   ========================================================= */
function updateNow(){
  const t=state.filtered[state.i]; if(!t) return;

  $('#now-title-show').textContent=t.title;
  $('#now-meta').textContent=[bpmLabel(t),t.length?fmtDur(t.length):''].filter(Boolean).join(' · ');

  const img=$('#now-thumb'), ph=$('#now-thumb-ph');
  const thumb=getThumb(t);
  img.src=thumb; img.style.display='block'; ph.style.display='none';
  img.onerror=()=>{img.style.display='none';ph.style.display='flex';};

  // Build action icons
  const actions=$('#now-actions');
  const mp3Btn=`<a class="now-icon" href="${t.src}" download title="Download MP3">⬇ MP3</a>`;
  const wavBtn=`<span class="now-icon members-only" title="WAV download (members only)">⬇ WAV</span>`;
  const hasLoVid = !!getVideoUrl(t, false);
  const loVidBtn = hasLoVid
    ? `<button class="now-icon" onclick="openVideo(false)" title="Play video">▶ Video</button>`
    : `<span class="now-icon members-only" title="No video for this track">▶ Video</span>`;
  const hqVidBtn = `<span class="now-icon members-only" title="HQ video (members only)">▶ HQ</span>`;

  // Version buttons
  let versionBtns='';
  if(t.versions&&t.versions.length){
    versionBtns=t.versions.map((v,vi)=>`<button class="now-icon version-btn" onclick="playVersion(${v.id})" title="Play ${v.name}">v${vi+2}</button>`).join('');
  }
  // Also: if this track IS a version, find its primary
  const primary=state.tracks.find(pk=>pk.versions&&pk.versions.some(v=>v.id===t.id));
  if(primary){
    versionBtns=`<button class="now-icon version-btn" onclick="playVersion(${primary.id})" title="Play original: ${primary.name}">v1</button>`+versionBtns;
  }

  actions.innerHTML=mp3Btn+wavBtn+loVidBtn+hqVidBtn+versionBtns;

  // Video overlay visibility
  $('#vid-overlay-btn').style.display = hasLoVid ? 'flex' : 'none';
}

function playVersion(trackId){
  const t=state.tracks.find(t=>t.id===trackId); if(!t) return;
  // Insert into filtered temporarily
  let idx=state.filtered.findIndex(t2=>t2.id===trackId);
  if(idx<0){
    state.filtered.splice(state.i+1,0,t);
    idx=state.i+1;
  }
  select(idx); play();
}

/* =========================================================
   MESSAGES FROM PLAYER IFRAME
   ========================================================= */
window.addEventListener('message',e=>{
  const d=e.data||{};
  if(d.status==='update'){
    state.playing=!!d.playing; state.duration=Number(d.duration)||0;
    const t=Number(d.time)||0;
    $('#btn-toggle').textContent=state.playing?'⏸ Pause':'► Play';
    $('#now-time').textContent=`${fmtDur(t)} / ${state.duration>0?fmtDur(state.duration):'--:--'}`;
    const sc=$('#pb-scrub');
    if(state.duration>0&&document.activeElement!==sc) sc.value=Math.min(100,Math.max(0,(t/state.duration)*100));
    try{localStorage.setItem('vvip25_time',t);}catch{}
  } else if(d.status==='ended'){
    if(state.filtered.length){const ni=(state.i+1)%state.filtered.length;select(ni);play();}
  }
});

$('#pb-scrub').addEventListener('input',e=>{ const pct=parseFloat(e.target.value)/100; if(state.duration>0)send({cmd:'seek',time:state.duration*pct}); });

/* =========================================================
   TOUCH SWIPE
   ========================================================= */
let tx0=0;
document.addEventListener('touchstart',e=>{const r=e.target.closest('.track-row');if(!r)return;tx0=e.changedTouches[0].screenX;},{passive:true});
document.addEventListener('touchend',e=>{
  const r=e.target.closest('.track-row');if(!r)return;
  const dx=e.changedTouches[0].screenX-tx0;
  const t=state.filtered.find(t=>t.id===Number(r.dataset.id));if(!t)return;
  if(dx>60){const was=state.favorites.has(t.name);was?state.favorites.delete(t.name):state.favorites.add(t.name);localStorage.setItem('vvip25:favs',JSON.stringify([...state.favorites]));r.querySelector('.star-btn')?.classList.toggle('on',!was);}
  else if(dx<-60){state.hiddenIds.add(t.id);r.style.transition='opacity .2s';r.style.opacity='0';setTimeout(()=>r.remove(),200);}
},{passive:true});

window.addEventListener('beforeunload',()=>{try{send({cmd:'report'});}catch{}});
</script>
</body>
