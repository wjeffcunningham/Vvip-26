<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VVIP Shader Visualizer — POC</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8a96e;
    --gold-dim: #7a6440;
    --bg: #0a0a0a;
    --panel: #111;
    --border: #222;
    --text: #ccc;
    --text-dim: #555;
    --mono: 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--panel);
  }

  header h1 {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: normal;
  }

  .tag-display {
    font-size: 10px;
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tag-display span {
    color: var(--gold-dim);
    margin-right: 4px;
  }

  main {
    display: grid;
    grid-template-columns: 1fr 220px;
    overflow: hidden;
  }

  #canvas-wrap {
    position: relative;
    overflow: hidden;
    background: #000;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  #no-audio {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    pointer-events: none;
  }

  #no-audio.hidden { display: none; }

  .side {
    border-left: 1px solid var(--border);
    overflow-y: auto;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .side-section {
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
  }

  .side-section h2 {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-weight: normal;
  }

  .param-row {
    display: grid;
    grid-template-columns: 80px 1fr 30px;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }

  .param-label {
    font-size: 10px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .param-bar-wrap {
    height: 3px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }

  .param-bar {
    height: 100%;
    background: var(--gold-dim);
    border-radius: 2px;
    transition: width 0.15s ease, background 0.3s ease;
  }

  .param-val {
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
  }

  /* Live meters */
  .meter-row {
    display: grid;
    grid-template-columns: 32px 1fr;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .meter-label { font-size: 10px; color: var(--text-dim); }

  .meter-bar-wrap {
    height: 5px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }

  .meter-bar {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    transition: width 0.04s linear;
  }

  #m-bass .meter-bar { background: #c84040; }
  #m-mid  .meter-bar { background: #c89040; }
  #m-high .meter-bar { background: #40a0c8; }
  #m-amp  .meter-bar { background: var(--gold); }

  /* Tag buttons */
  .tags-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tag-btn {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.05em;
    border-radius: 2px;
    transition: all 0.1s;
  }

  .tag-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .tag-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(200,169,110,0.08); }

  footer {
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.1s;
  }

  .btn:hover { border-color: var(--gold); color: var(--gold); }
  .btn.primary { border-color: var(--gold-dim); color: var(--gold); }
  .btn.primary:hover { background: rgba(200,169,110,0.12); }

  #status {
    font-size: 10px;
    color: var(--text-dim);
    flex: 1;
  }

  #file-input { display: none; }

  .blend-note {
    font-size: 9px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-top: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>VVIP — Shader Visualizer POC</h1>
  <div class="tag-display" id="active-tag-display">no tags active</div>
</header>

<main>
  <div id="canvas-wrap">
    <canvas id="gl"></canvas>
    <div id="no-audio">
      <div>load an audio file to begin</div>
    </div>
  </div>

  <div class="side">
    <!-- Live audio meters -->
    <div class="side-section">
      <h2>Audio — Live</h2>
      <div class="meter-row" id="m-amp">
        <div class="meter-label">amp</div>
        <div class="meter-bar-wrap"><div class="meter-bar"></div></div>
      </div>
      <div class="meter-row" id="m-bass">
        <div class="meter-label">bass</div>
        <div class="meter-bar-wrap"><div class="meter-bar"></div></div>
      </div>
      <div class="meter-row" id="m-mid">
        <div class="meter-label">mid</div>
        <div class="meter-bar-wrap"><div class="meter-bar"></div></div>
      </div>
      <div class="meter-row" id="m-high">
        <div class="meter-label">high</div>
        <div class="meter-bar-wrap"><div class="meter-bar"></div></div>
      </div>
    </div>

    <!-- Blended shader params -->
    <div class="side-section">
      <h2>Blended Parameters</h2>
      <div id="param-list"></div>
    </div>

    <!-- Tag picker -->
    <div class="side-section" style="flex:1">
      <h2>Tag Presets</h2>
      <div class="tags-grid" id="tags-grid"></div>
      <div class="blend-note">
        Select multiple tags — parameters blend additively. Converging vectors produce emergent results.
      </div>
    </div>
  </div>
</main>

<footer>
  <button class="btn primary" onclick="document.getElementById('file-input').click()">Load Audio</button>
  <input type="file" id="file-input" accept="audio/*">
  <button class="btn" id="play-btn" onclick="togglePlay()" disabled>Play</button>
  <button class="btn" onclick="clearTags()">Clear Tags</button>
  <div id="status">ready</div>
</footer>

<script>
// ─── Shader source ─────────────────────────────────────────────────────────

const VERT = `
attribute vec2 pos;
void main() { gl_Position = vec4(pos, 0.0, 1.0); }
`;

// The main fragment shader.
// Uniforms driven by tag blend + live audio FFT.
const FRAG = `
precision highp float;

uniform vec2  u_res;
uniform float u_time;

// Audio uniforms (live)
uniform float u_amp;
uniform float u_bass;
uniform float u_mid;
uniform float u_high;

// Tag-blended parameters
uniform float u_bassWeight;
uniform float u_midWeight;
uniform float u_highWeight;
uniform float u_reactivity;
uniform float u_decay;        // used as persistence multiplier in time
uniform float u_timeScale;
uniform float u_complexity;
uniform float u_saturation;
uniform float u_warmth;
uniform float u_brightness;
uniform float u_turbulence;
uniform float u_symmetry;     // 0=none, 1=high radial symmetry
uniform float u_particleDensity;
uniform float u_grainAmount;
uniform float u_pulseSharpness;

// ── Utilities ────────────────────────────────────────────────────────────

float hash(vec2 p) {
  p = fract(p * vec2(234.34, 435.345));
  p += dot(p, p + 34.23);
  return fract(p.x * p.y);
}

vec2 hash2(vec2 p) {
  return vec2(hash(p), hash(p + vec2(1.7, 9.2)));
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash(i), hash(i + vec2(1,0)), u.x),
    mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x),
    u.y
  );
}

float fbm(vec2 p, int oct) {
  float v = 0.0, a = 0.5, s = 0.0;
  for (int i = 0; i < 6; i++) {
    if (i >= oct) break;
    v += a * noise(p);
    s += a;
    p *= 2.1 + u_turbulence * 0.4;
    a *= 0.5;
  }
  return v / s;
}

// ── Audio-reactive drive value ─────────────────────────────────────────

float audioDrive() {
  float d = u_bass * u_bassWeight
          + u_mid  * u_midWeight
          + u_high * u_highWeight;
  // pulse sharpness: 0=linear, 1=pow-curve snap
  float shaped = mix(d, pow(d, 0.3), u_pulseSharpness);
  return shaped * u_reactivity + u_amp * 0.15;
}

// ── Palette ────────────────────────────────────────────────────────────
// warmth: 0=ice-blue, 0.5=neutral, 1=amber/ember
// saturation: 0=mono, 1=vivid

vec3 palette(float t, float drive) {
  // Base hue shift driven by warmth
  float hBase = mix(0.6, 0.08, u_warmth);          // blue → orange
  float hShift = drive * 0.12 * u_reactivity;
  float h = mod(hBase + t * mix(0.1, 0.4, u_saturation) + hShift, 1.0);

  // HSL → RGB (simple)
  vec3 rgb = clamp(abs(mod(h*6.0 + vec3(0,4,2), 6.0) - 3.0) - 1.0, 0.0, 1.0);
  float lum = u_brightness * (0.5 + drive * 0.35);
  rgb = mix(vec3(lum), rgb, u_saturation);
  return rgb * (lum + drive * 0.3);
}

// ── Domain warp ────────────────────────────────────────────────────────

vec2 warp(vec2 p, float t, float drive) {
  int oct = int(2.0 + u_complexity * 4.0);
  float strength = u_turbulence * (0.4 + drive * 0.6);
  vec2 q = vec2(fbm(p + t * 0.3, oct), fbm(p + vec2(5.2, 1.3) + t * 0.25, oct));
  vec2 r = vec2(fbm(p + q + vec2(1.7, 9.2) + t * 0.15, oct),
                fbm(p + q + vec2(8.3, 2.8) + t * 0.18, oct));
  return p + strength * r;
}

// ── Radial symmetry ────────────────────────────────────────────────────

vec2 radialFold(vec2 p, float folds) {
  if (folds < 2.0) return p;
  float angle = atan(p.y, p.x);
  float r = length(p);
  float sliceAngle = 6.28318 / folds;
  angle = mod(angle, sliceAngle);
  if (angle > sliceAngle * 0.5) angle = sliceAngle - angle;
  return vec2(cos(angle), sin(angle)) * r;
}

// ── Particle field ─────────────────────────────────────────────────────

float particles(vec2 p, float t, float drive) {
  if (u_particleDensity < 0.05) return 0.0;
  float result = 0.0;
  float count = 6.0 + u_particleDensity * 20.0;
  for (float i = 0.0; i < 26.0; i++) {
    if (i >= count) break;
    vec2 seed = vec2(i * 1.37, i * 0.73 + 3.1);
    vec2 h2 = hash2(seed);
    float speed = 0.1 + h2.x * 0.3;
    vec2 pos = h2 + vec2(sin(t * speed + h2.y * 6.28), cos(t * speed * 0.8 + h2.x * 6.28)) * 0.3;
    pos = fract(pos) * 2.0 - 1.0;
    float d = length(p - pos);
    float size = 0.002 + drive * 0.015 * u_pulseSharpness;
    result += size / (d * d + 0.001);
  }
  return clamp(result, 0.0, 1.0);
}

// ── Grain ──────────────────────────────────────────────────────────────

float grain(vec2 uv, float t) {
  return hash(uv * 500.0 + t * 100.0) * u_grainAmount;
}

// ── Main ───────────────────────────────────────────────────────────────

void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  vec2 p = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);

  float drive = audioDrive();
  float t = u_time * u_timeScale * (1.0 + drive * u_reactivity * 0.5);

  // Radial symmetry
  float folds = mix(1.0, 8.0, u_symmetry);
  p = radialFold(p, folds);

  // Domain warp (the soul of the shader)
  vec2 wp = warp(p * (1.5 + u_complexity), t, drive);

  // Field value
  int oct = int(2.0 + u_complexity * 4.0);
  float f1 = fbm(wp + t * 0.1, oct);
  float f2 = fbm(wp * 1.7 - t * 0.07, oct);
  float field = f1 * 0.6 + f2 * 0.4;

  // Audio pulse — a radial ring that pulses on bass hits
  float pulse = 0.0;
  if (u_bass > 0.1) {
    float r = length(p);
    float ring = 0.3 + u_bass * u_bassWeight * 0.5;
    pulse = exp(-abs(r - ring) * (10.0 + u_pulseSharpness * 20.0)) * u_bass * u_bassWeight;
  }

  // Particle layer
  float pts = particles(p, t, drive);

  // Color
  float colorT = field + pulse * 0.3 + pts * 0.2;
  vec3 col = palette(colorT, drive);

  // Pulse brightness flash
  col += vec3(pulse * u_pulseSharpness * 0.4);

  // Particles add sparkle
  col += vec3(pts) * mix(vec3(1.0), vec3(0.8, 0.9, 1.0), u_warmth < 0.4 ? 1.0 : 0.0) * 0.6;

  // Grain
  col += grain(uv, u_time) * 0.8;

  // Vignette
  float vig = 1.0 - length(uv - 0.5) * 1.2;
  col *= vig * vig;

  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}
`;

// ─── Tag data ─────────────────────────────────────────────────────────────

// Embedded directly — in production this loads from shader_tags.json
const TAG_DATA = null; // will be fetched from shader_tags.json if available

// Default params (neutral)
const PARAM_DEFAULTS = {
  bassWeight:0.4, midWeight:0.3, highWeight:0.2,
  reactivity:0.4, decay:0.6, timeScale:0.2,
  complexity:0.4, saturation:0.4, warmth:0.5,
  brightness:0.4, turbulence:0.3, symmetry:0.3,
  particleDensity:0.15, grainAmount:0.15, pulseSharpness:0.4
};

// ─── State ─────────────────────────────────────────────────────────────────

let gl, program, uniforms = {};
let animId;
let startTime = Date.now();
let audioCtx, analyser, source, audioBuffer;
let fftData;
let isPlaying = false;
let activeTags = new Set();
let blendedParams = {...PARAM_DEFAULTS};
let smoothedAudio = { amp: 0, bass: 0, mid: 0, high: 0 };
let tagDefs = {};

// ─── WebGL init ────────────────────────────────────────────────────────────

function initGL() {
  const canvas = document.getElementById('gl');
  gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) { alert('WebGL not supported'); return; }

  const vs = compileShader(gl.VERTEX_SHADER, VERT);
  const fs = compileShader(gl.FRAGMENT_SHADER, FRAG);
  program = gl.createProgram();
  gl.attachShader(program, vs);
  gl.attachShader(program, fs);
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    console.error('Link error:', gl.getProgramInfoLog(program));
    return;
  }
  gl.useProgram(program);

  // Full-screen quad
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const posLoc = gl.getAttribLocation(program, 'pos');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  // Cache uniform locations
  const uNames = ['u_res','u_time','u_amp','u_bass','u_mid','u_high',
    'u_bassWeight','u_midWeight','u_highWeight','u_reactivity','u_decay',
    'u_timeScale','u_complexity','u_saturation','u_warmth','u_brightness',
    'u_turbulence','u_symmetry','u_particleDensity','u_grainAmount','u_pulseSharpness'];
  uNames.forEach(n => uniforms[n] = gl.getUniformLocation(program, n));

  resize();
  window.addEventListener('resize', resize);
  render();
}

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:', gl.getShaderInfoLog(s));
  }
  return s;
}

function resize() {
  const canvas = document.getElementById('gl');
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
}

// ─── Render loop ──────────────────────────────────────────────────────────

function render() {
  animId = requestAnimationFrame(render);

  const t = (Date.now() - startTime) / 1000;

  // Analyse audio
  let amp = 0, bass = 0, mid = 0, high = 0;
  if (analyser && fftData) {
    analyser.getByteFrequencyData(fftData);
    const len = fftData.length;
    // Frequency bins: bass 0–10%, mid 10–50%, high 50–100%
    let bCount=0, mCount=0, hCount=0;
    for (let i = 0; i < len; i++) {
      const v = fftData[i] / 255;
      amp += v;
      const pct = i / len;
      if (pct < 0.1)      { bass += v; bCount++; }
      else if (pct < 0.5) { mid  += v; mCount++; }
      else                { high += v; hCount++; }
    }
    amp  /= len;
    bass  = bCount  ? bass  / bCount  : 0;
    mid   = mCount  ? mid   / mCount  : 0;
    high  = hCount  ? high  / hCount  : 0;
  }

  // Smooth with decay
  const decay = blendedParams.decay;
  const smooth = 0.05 + (1 - decay) * 0.15;
  smoothedAudio.amp  += (amp  - smoothedAudio.amp)  * (smooth + 0.1);
  smoothedAudio.bass += (bass - smoothedAudio.bass) * (smooth + 0.05);
  smoothedAudio.mid  += (mid  - smoothedAudio.mid)  * smooth;
  smoothedAudio.high += (high - smoothedAudio.high) * smooth;

  // Feed meters
  setMeter('m-amp',  smoothedAudio.amp);
  setMeter('m-bass', smoothedAudio.bass);
  setMeter('m-mid',  smoothedAudio.mid);
  setMeter('m-high', smoothedAudio.high);

  // Set uniforms
  const canvas = document.getElementById('gl');
  gl.uniform2f(uniforms.u_res, canvas.width, canvas.height);
  gl.uniform1f(uniforms.u_time, t);
  gl.uniform1f(uniforms.u_amp,  smoothedAudio.amp);
  gl.uniform1f(uniforms.u_bass, smoothedAudio.bass);
  gl.uniform1f(uniforms.u_mid,  smoothedAudio.mid);
  gl.uniform1f(uniforms.u_high, smoothedAudio.high);

  const p = blendedParams;
  gl.uniform1f(uniforms.u_bassWeight,     p.bassWeight);
  gl.uniform1f(uniforms.u_midWeight,      p.midWeight);
  gl.uniform1f(uniforms.u_highWeight,     p.highWeight);
  gl.uniform1f(uniforms.u_reactivity,     p.reactivity);
  gl.uniform1f(uniforms.u_decay,          p.decay);
  gl.uniform1f(uniforms.u_timeScale,      p.timeScale);
  gl.uniform1f(uniforms.u_complexity,     p.complexity);
  gl.uniform1f(uniforms.u_saturation,     p.saturation);
  gl.uniform1f(uniforms.u_warmth,         p.warmth);
  gl.uniform1f(uniforms.u_brightness,     p.brightness);
  gl.uniform1f(uniforms.u_turbulence,     p.turbulence);
  gl.uniform1f(uniforms.u_symmetry,       p.symmetry);
  gl.uniform1f(uniforms.u_particleDensity,p.particleDensity);
  gl.uniform1f(uniforms.u_grainAmount,    p.grainAmount);
  gl.uniform1f(uniforms.u_pulseSharpness, p.pulseSharpness);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function setMeter(id, val) {
  const el = document.querySelector(`#${id} .meter-bar`);
  if (el) el.style.width = Math.min(100, val * 100) + '%';
}

// ─── Audio ────────────────────────────────────────────────────────────────

document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;

  setStatus('loading…');
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.6;
    fftData = new Uint8Array(analyser.frequencyBinCount);
    analyser.connect(audioCtx.destination);
  }

  const ab = await file.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(ab);
  setStatus(file.name);

  document.getElementById('no-audio').classList.add('hidden');
  document.getElementById('play-btn').disabled = false;

  // Autoplay
  playAudio();
});

function playAudio() {
  if (!audioBuffer) return;
  if (source) { try { source.stop(); } catch(e){} }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.loop = true;
  source.start();
  isPlaying = true;
  document.getElementById('play-btn').textContent = 'Pause';
  startTime = Date.now();
}

function togglePlay() {
  if (!audioBuffer) return;
  if (isPlaying) {
    audioCtx.suspend();
    isPlaying = false;
    document.getElementById('play-btn').textContent = 'Play';
  } else {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
      isPlaying = true;
      document.getElementById('play-btn').textContent = 'Pause';
    } else {
      playAudio();
    }
  }
}

// Attempt to load full shader_tags.json
fetch('shader_tags.json')
  .then(r => r.json())
  .then(data => {
    tagDefs = data.tags || {};
    // Merge inline tags as fallback
    Object.entries(INLINE_TAGS).forEach(([k, v]) => {
      if (!tagDefs[k]) tagDefs[k] = v;
    });
    buildTagButtons();
  })
  .catch(() => {
    // Use inline tags only
    tagDefs = INLINE_TAGS;
    buildTagButtons();
  });

// Use inline tags immediately so UI appears
tagDefs = INLINE_TAGS;
setTimeout(buildTagButtons, 0);

function buildTagButtons() {
  const grid = document.getElementById('tags-grid');
  grid.innerHTML = '';
  Object.keys(tagDefs).sort().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = '#' + tag;
    btn.dataset.tag = tag;
    btn.addEventListener('click', () => toggleTag(tag, btn));
    grid.appendChild(btn);
  });
}

function toggleTag(tag, btn) {
  if (activeTags.has(tag)) {
    activeTags.delete(tag);
    btn.classList.remove('active');
  } else {
    activeTags.add(tag);
    btn.classList.add('active');
  }
  reblend();
}

function clearTags() {
  activeTags.clear();
  document.querySelectorAll('.tag-btn.active').forEach(b => b.classList.remove('active'));
  reblend();
}

function reblend() {
  if (activeTags.size === 0) {
    blendedParams = {...PARAM_DEFAULTS};
  } else {
    // Additive blend, then normalize to 0-1
    const keys = Object.keys(PARAM_DEFAULTS);
    const sum = {};
    keys.forEach(k => sum[k] = 0);
    activeTags.forEach(tag => {
      const def = tagDefs[tag];
      if (!def) return;
      keys.forEach(k => sum[k] += def[k] ?? PARAM_DEFAULTS[k]);
    });
    // Normalize by tag count (average)
    const n = activeTags.size;
    keys.forEach(k => blendedParams[k] = Math.min(1, Math.max(0, sum[k] / n)));
  }

  updateTagDisplay();
  updateParamUI();
}

function updateTagDisplay() {
  const el = document.getElementById('active-tag-display');
  if (activeTags.size === 0) {
    el.innerHTML = 'no tags active';
  } else {
    el.innerHTML = [...activeTags].map(t => `<span>#${t}</span>`).join('');
  }
}

function updateParamUI() {
  const container = document.getElementById('param-list');
  const labels = {
    bassWeight:'bass wt', midWeight:'mid wt', highWeight:'high wt',
    reactivity:'react', decay:'decay', timeScale:'t.scale',
    complexity:'complex', saturation:'sat', warmth:'warmth',
    brightness:'bright', turbulence:'turb', symmetry:'symm',
    particleDensity:'particles', grainAmount:'grain', pulseSharpness:'pulse'
  };
  container.innerHTML = '';
  Object.entries(blendedParams).forEach(([k, v]) => {
    const row = document.createElement('div');
    row.className = 'param-row';
    const pct = Math.round(v * 100);
    row.innerHTML = `
      <div class="param-label">${labels[k] || k}</div>
      <div class="param-bar-wrap">
        <div class="param-bar" style="width:${pct}%; background:${paramColor(v)}"></div>
      </div>
      <div class="param-val">${pct}</div>
    `;
    container.appendChild(row);
  });
}

function paramColor(v) {
  // Dim gold at 0, bright gold at 1
  const r = Math.round(80 + v * 120);
  const g = Math.round(60 + v * 100);
  const b = Math.round(20 + v * 40);
  return `rgb(${r},${g},${b})`;
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

window.addEventListener('load', () => {
