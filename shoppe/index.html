<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>VVIP Store</title>
<link rel="icon" href="/favicon.ico?v=3">
<style>
:root{
  --bg:#ffffff;--fg:#111111;--muted:#555555;
  --border:#bbbbbb;--border-light:#dddddd;
  --card:#eeeeee;--hover:#dde6ff;
  --link:#0000aa;--link-hov:#aa0000;
  --btn-bg:#d0d0d0;--btn-hi:#f8f8f8;--btn-sh:#888888;--btn-dk:#444444;
  --gold-bg:#c8a84b;--gold-hi:#f0d480;--gold-sh:#7a6020;--gold-fg:#2a1800;
  --avail:#006600;--unavail:#888888;
  --logo-g1:#000044;--logo-g2:#003399;--logo-glo:#2255ee;
}
[data-theme="dark"]{
  --bg:#111014;--fg:#e8e4d8;--muted:#888880;
  --border:#2a2830;--border-light:#1e1c24;
  --card:#17151c;--hover:#1a1830;
  --link:#6699ff;--link-hov:#ff6644;
  --btn-bg:#28263a;--btn-hi:#484660;--btn-sh:#0c0b14;--btn-dk:#060610;
  --gold-bg:#7a6020;--gold-hi:#c8a84b;--gold-sh:#3a2a08;--gold-fg:#f0d080;
  --avail:#44cc44;--unavail:#666660;
  --logo-g1:#2244aa;--logo-g2:#4477dd;--logo-glo:#88aaff;
}
*,*::before,*::after{box-sizing:border-box}
html{height:100%;-webkit-text-size-adjust:100%}
body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:"Times New Roman",Times,serif;font-size:15px;line-height:1.4;transition:background .3s,color .3s;overscroll-behavior:none}
a{color:var(--link);text-decoration:none}
a:hover{color:var(--link-hov);text-decoration:underline}
#page{max-width:700px;margin:0 auto;padding:0 12px env(safe-area-inset-bottom,60px)}

/* HEADER */
#site-header{border-bottom:2px solid var(--fg);padding:12px 0 6px;position:relative}
#site-name{
  font-size:48px;font-weight:bold;margin:0 0 4px;
  font-family:"Times New Roman",Times,serif;
  display:inline-block;line-height:1;white-space:nowrap;
  background:linear-gradient(90deg,var(--logo-g1) 0%,var(--logo-g2) 35%,var(--logo-glo) 50%,var(--logo-g2) 65%,var(--logo-g1) 100%);
  background-size:260% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logoPulse 5s ease-in-out infinite;
}
@keyframes logoPulse{
  0%{background-position:0% 50%;filter:drop-shadow(0 0 3px rgba(0,40,180,.12))}
  50%{background-position:100% 50%;filter:drop-shadow(0 0 14px rgba(0,80,255,.38))}
  100%{background-position:0% 50%;filter:drop-shadow(0 0 3px rgba(0,40,180,.12))}
}
#site-nav{font-family:Arial,Helvetica,sans-serif;font-size:12px;display:flex;flex-wrap:wrap;align-items:center}
#site-nav a,#site-nav button{color:var(--fg);text-decoration:none;margin-right:14px;font-size:12px;font-family:Arial,Helvetica,sans-serif;background:none;border:none;padding:0;cursor:pointer;line-height:1.9}
#site-nav a:hover,#site-nav button:hover{color:var(--link-hov);text-decoration:underline}
.nav-sep{margin-right:14px;color:var(--muted);font-family:Arial,sans-serif;font-size:12px;line-height:1.9}

/* FILTER BAR */
#filter-bar{
  border:1px solid var(--border);border-top:none;
  padding:5px 8px;background:var(--card);
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  font-family:Arial,sans-serif;font-size:12px;
}
.ftag{
  font-family:Arial,Helvetica,sans-serif;font-size:11px;
  background:var(--btn-bg);
  border:1px solid;border-color:var(--btn-hi) var(--btn-sh) var(--btn-sh) var(--btn-hi);
  padding:2px 8px;cursor:pointer;color:var(--fg);
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.ftag.active{
  background:var(--gold-bg);color:var(--gold-fg);
  border-color:var(--gold-hi) var(--gold-sh) var(--gold-sh) var(--gold-hi);
}
#avail-toggle{
  margin-left:auto;font-family:Arial,sans-serif;font-size:11px;color:var(--muted);cursor:pointer;
  background:none;border:none;text-decoration:underline;padding:0;
}

/* GRID */
#shop-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:0;
  border:1px solid var(--border);border-top:none;
}
.shop-item{
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:0;
  display:flex;flex-direction:column;
  background:var(--bg);
  transition:background .15s;
}
.shop-item:hover{background:var(--hover)}
.shop-item.unavailable{opacity:.55}

.item-img{
  width:100%;aspect-ratio:1;object-fit:cover;
  display:block;border-bottom:1px solid var(--border-light);
  background:var(--card);
}
.item-body{padding:10px 10px 8px;flex:1;display:flex;flex-direction:column;gap:4px}
.item-title{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:bold;color:var(--fg);line-height:1.2}
.item-desc{font-family:"Times New Roman",Times,serif;font-size:12px;color:var(--muted);flex:1}
.item-price{font-family:"Courier New",Courier,monospace;font-size:13px;color:var(--fg);font-weight:bold}
.item-avail{font-family:Arial,sans-serif;font-size:10px;font-weight:bold;letter-spacing:.04em;text-transform:uppercase}
.item-avail.yes{color:var(--avail)}
.item-avail.no{color:var(--unavail)}

.item-actions{padding:0 10px 10px;display:flex;gap:6px;flex-wrap:wrap}
.shop-btn{
  font-family:Arial,Helvetica,sans-serif;font-size:11px;font-weight:bold;
  background:var(--gold-bg);
  border:2px solid;border-color:var(--gold-hi) var(--gold-sh) var(--gold-sh) var(--gold-hi);
  padding:4px 10px;cursor:pointer;color:var(--gold-fg);
  text-decoration:none;display:inline-block;white-space:nowrap;
  box-shadow:1px 1px 0 var(--gold-sh);touch-action:manipulation;
}
.shop-btn:hover{background:var(--gold-hi)}
.shop-btn:active{border-color:var(--gold-sh) var(--gold-hi) var(--gold-hi) var(--gold-sh)}
.shop-btn.secondary{background:var(--btn-bg);color:var(--fg);border-color:var(--btn-hi) var(--btn-sh) var(--btn-sh) var(--btn-hi);box-shadow:1px 1px 0 var(--btn-sh);font-weight:normal}
.shop-btn.secondary:hover{background:var(--hover)}

#empty-shop{display:none;padding:24px;font-family:Arial,sans-serif;font-size:13px;color:var(--muted);text-align:center;border:1px solid var(--border);border-top:none}

@media(max-width:420px){
  #shop-grid{grid-template-columns:repeat(2,1fr)}
  .item-title{font-size:12px}
}
</style>
</head>

<div id="site-header">

  <div id="site-nav">
    <a href="/">&#8592; Media</a>
    <a href="https://www.youtube.com/@VVVVIIPP26" target="_blank" rel="noopener">YouTube</a>
    <a href="https://www.instagram.com/vvipmediadotnet/" target="_blank" rel="noopener">Instagram</a>
    <span class="nav-sep">|</span>
    <button onclick="toggleDark()">&#9680;</button>
  </div>
</div>

<div id="filter-bar">
  <button class="ftag active" data-tag="all">All</button>
  <button class="ftag" data-tag="#lp">LP</button>
  <button class="ftag" data-tag="#cassette">Cassette</button>
  <button class="ftag" data-tag="#audio">Digital</button>
  <button class="ftag" data-tag="#apparel">Apparel</button>
  <button class="ftag" data-tag="#print">Print</button>
  <button id="avail-toggle" onclick="toggleAvailOnly()">Available only</button>
</div>

<div id="shop-grid"></div>
<div id="empty-shop">No items match.</div>

<script>
const BASE_IMG='https://cdn.vvipmedia.net/MEDIA/shoppe/';
let items=[], activeTag='all', availOnly=false;

function fmt(price,cur){
  if(price>=1000000) return '$'+price.toLocaleString()+' '+cur+' (seriously)';
  return '$'+price.toFixed(0)+' '+cur;
}

function render(){
  const grid=document.getElementById('shop-grid');
  const empty=document.getElementById('empty-shop');
  const filtered=items.filter(it=>{
    if(availOnly&&!it.available) return false;
    if(activeTag==='all') return true;
    return (it.tags||[]).includes(activeTag);
  });
  if(!filtered.length){grid.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  grid.innerHTML=filtered.map(it=>{
    const imgSrc=it.image?BASE_IMG+it.image.replace('./',''):'';
    const priceStr=fmt(it.price,it.currency||'CAD');
    const availLabel=it.available
      ?'<span class="item-avail yes">Available</span>'
      :'<span class="item-avail no">Unavailable</span>';
    let btns='';
    if(it.available&&it.bandcamp_url){
      btns+=`<a class="shop-btn" href="${it.bandcamp_url}" target="_blank" rel="noopener">Buy / Listen</a>`;
    } else if(it.available&&it.fb_marketplace){
      btns+=`<a class="shop-btn" href="${it.fb_marketplace}" target="_blank" rel="noopener">View listing</a>`;
    } else if(!it.available){
      btns+=`<span class="shop-btn secondary" style="pointer-events:none;opacity:.5">Unavailable</span>`;
    }
    return `<div class="shop-item${it.available?'':' unavailable'}">
      ${imgSrc?`<img class="item-img" src="${imgSrc}" alt="${it.title}" loading="lazy" onerror="this.style.display='none'">`:'<div class="item-img" style="background:var(--card)"></div>'}
      <div class="item-body">
        <div class="item-title">${it.title}</div>
        <div class="item-desc">${it.description||''}</div>
        <div class="item-price">${priceStr}</div>
        ${availLabel}
      </div>
      <div class="item-actions">${btns}</div>
    </div>`;
  }).join('');
}

document.querySelectorAll('.ftag').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeTag=btn.dataset.tag;
  render();
}));

function toggleAvailOnly(){
  availOnly=!availOnly;
  document.getElementById('avail-toggle').textContent=availOnly?'Show all':'Available only';
  render();
}

function toggleDark(){
  const cur=document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme',cur==='dark'?'light':'dark');
}
